info:
  name: vehicle-post
  type: http

http:
  method: POST
  url: https://christina.pathway4.click/vehicle/
  auth: inherit
  body:
    mode: json
    json: |
      {
        "model": "Ford Transit",
        "license_plate": "ABC-1234",
        "driver_id": 1
      }

headers:
  Content-Type: application/json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
